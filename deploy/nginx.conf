# /etc/nginx/sites-available/pattanifc.co
# Deploy: sudo cp deploy/nginx.conf /etc/nginx/sites-available/pattanifc.co \
#      && sudo nginx -t && sudo systemctl reload nginx
#
# Requires SSL cert files at /etc/ssl/pattanifc/ (see setup notes).

# HTTP → HTTPS redirect (also serves ACME/DCV challenges)
server {
    listen 80;
    listen [::]:80;
    server_name pattanifc.co www.pattanifc.co;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /.well-known/pki-validation/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS main server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name pattanifc.co www.pattanifc.co;

    ssl_certificate     /etc/ssl/pattanifc/fullchain.crt;
    ssl_certificate_key /etc/ssl/pattanifc/pattanifc.co.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # User-uploaded assets: serve directly from disk, bypass Next.js.
    # Next.js locks its public/ file list at build time; runtime uploads
    # never appear via the Node process. nginx reads from disk each request.
    location /uploads/ {
        alias /var/www/pattani-fc/public/uploads/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        try_files $uri =404;
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        client_max_body_size 10M;
    }
}
